name: CI Pipeline

on:
  pull_request:
    branches:
      - '**'
    types:
      - opened        # PR is first opened
      - synchronize   # new commit pushed to the PR branch
      - reopened      # PR is re-opened

jobs:
  # ──────────────────────────────────────────────────────────
  # Backend: Lint + Test  (NestJS / Jest)
  # ──────────────────────────────────────────────────────────
  backend:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # version from package.json packageManager field

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Run ESLint WITHOUT --fix so CI only checks, never modifies files.
      - name: Lint (ESLint + Prettier check)
        working-directory: webiu-server
        run: pnpm exec eslint "{src,apps,libs,test}/**/*.ts"

      - name: Run unit tests
        working-directory: webiu-server
        run: pnpm test -- --passWithNoTests --forceExit

  # ──────────────────────────────────────────────────────────
  # Frontend: Lint + Test  (Angular 17 / Karma + ChromeHeadless)
  # ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend - Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # version from package.json packageManager field

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (angular-eslint)
        working-directory: webiu-ui
        run: pnpm run lint

      # Install a known-good Chrome version via the official action so
      # CHROME_BIN is always set correctly regardless of the runner image.
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Run unit tests (headless Chrome)
        working-directory: webiu-ui
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: pnpm test -- --browsers=ChromeHeadlessNoSandbox --watch=false --no-progress
